{% extends 'base.html' %}
{% block title %}My Profile — ZTech{% endblock %}
{% block content %}
<div class="container" style="padding-bottom:80px;">
  <div class="page-header">
    <p class="section-label">Account</p>
    <h1>My Profile</h1>
  </div>
  <div style="display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:start;">
    <!-- Sidebar -->
    <div class="card">
      <div class="card-body" style="padding:16px 0;">
        {% for item in account_nav %}
        <a href="{{ item.url }}" style="display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:0.85rem;color:var(--text-muted);transition:all var(--transition);" class="{% if item.active %}active{% endif %}" onmouseover="this.style.color='var(--text)';this.style.background='var(--surface)'" onmouseout="this.style.color='';this.style.background=''">
          <i class="bi bi-{{ item.icon }}"></i> {{ item.label }}
        </a>
        {% empty %}
        <a href="{% url 'accounts:profile' %}" style="display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:0.85rem;color:var(--text);"><i class="bi bi-person"></i> Profile</a>
        <a href="{% url 'accounts:order_history' %}" style="display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:0.85rem;color:var(--text-muted);"><i class="bi bi-bag-check"></i> Orders</a>
        <a href="{% url 'accounts:address_list' %}" style="display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:0.85rem;color:var(--text-muted);"><i class="bi bi-geo-alt"></i> Addresses</a>
        <div class="divider" style="margin:8px 0;"></div>
        <a href="{% url 'accounts:logout' %}" style="display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:0.85rem;color:var(--text-muted);"><i class="bi bi-box-arrow-right"></i> Sign Out</a>
        {% endfor %}
      </div>
    </div>
    <!-- Form -->
    <div class="card reveal">
      <div class="card-header"><h3>Personal Information</h3></div>
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" value="{{ form.first_name.value|default:request.user.first_name }}" required>
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control" value="{{ form.last_name.value|default:request.user.last_name }}">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" value="{{ form.email.value|default:request.user.email }}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" value="{{ form.phone.value|default:request.user.phone }}">
          </div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
