{% extends 'base.html' %}
{% block title %}{{ title }} — ZTech{% endblock %}
{% block content %}
<div class="container-sm" style="padding-bottom:80px;">
  <div class="page-header"><h1>{{ title }}</h1></div>
  <div class="card reveal">
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Full Name</label><input type="text" name="full_name" class="form-control" value="{{ form.full_name.value|default:'' }}" required></div>
          <div class="form-group"><label class="form-label">Phone</label><input type="tel" name="phone" class="form-control" value="{{ form.phone.value|default:'' }}" required></div>
        </div>
        <div class="form-group"><label class="form-label">Street Address</label><input type="text" name="street" class="form-control" value="{{ form.street.value|default:'' }}" required></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">City</label><input type="text" name="city" class="form-control" value="{{ form.city.value|default:'' }}" required></div>
          <div class="form-group">
            <label class="form-label">Wilaya</label>
            <select name="wilaya" class="form-control" required>
              {% for code, name in form.fields.wilaya.choices %}{% if code %}<option value="{{ code }}" {% if form.wilaya.value == code %}selected{% endif %}>{{ name }}</option>{% endif %}{% endfor %}
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Postal Code (optional)</label><input type="text" name="postal_code" class="form-control" value="{{ form.postal_code.value|default:'' }}"></div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
          <input type="checkbox" name="is_default" id="is_default" {% if form.is_default.value %}checked{% endif %} style="width:16px;height:16px;">
          <label for="is_default" style="font-size:0.85rem;color:var(--text-muted);">Set as default address</label>
        </div>
        <div style="display:flex;gap:12px;margin-top:8px;">
          <button type="submit" class="btn btn-primary">Save Address</button>
          <a href="{% url 'accounts:address_list' %}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
