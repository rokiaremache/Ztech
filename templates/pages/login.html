{% extends 'base.html' %}
{% block title %}Sign In — ZTech{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:40px 1rem;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:40px;">
      <p class="section-label">Welcome back</p>
      <h1 style="font-family:var(--font-heading);font-size:2.4rem;font-weight:300;">Sign In</h1>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="POST">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required value="{{ form.email.value|default:'' }}">
            {% if form.email.errors %}<div class="form-error">{{ form.email.errors.0 }}</div>{% endif %}
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">Sign In</button>
        </form>
        <div class="divider-text" style="margin:24px 0;">or</div>
        <a href="{% url 'accounts:register' %}" class="btn btn-outline btn-full">Create Account</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
